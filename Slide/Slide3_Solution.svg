<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1280" height="720" fill="#f0fdfa"/>
  <rect x="0" y="0" width="1280" height="120" fill="#0f766e"/>
  <text x="80" y="78" fill="#ffffff" font-size="50" font-weight="700">The Solution: Humanity</text>
  <text x="80" y="105" fill="#99f6e4" font-size="24">One platform to take action against poverty</text>

  <!-- pillar 1 -->
  <rect x="90" y="200" width="340" height="320" rx="20" fill="#ffffff" stroke="#5eead4" stroke-width="3"/>
  <circle cx="260" cy="290" r="50" fill="#ccfbf1"/>
  <text x="260" y="308" text-anchor="middle" font-size="48">❤️</text>
  <text x="260" y="400" text-anchor="middle" fill="#0f172a" font-size="34" font-weight="700">Donate</text>
  <text x="260" y="445" text-anchor="middle" fill="#475569" font-size="22">Give to trusted</text>
  <text x="260" y="475" text-anchor="middle" fill="#475569" font-size="22">organizations</text>

  <!-- pillar 2 -->
  <rect x="470" y="200" width="340" height="320" rx="20" fill="#ffffff" stroke="#5eead4" stroke-width="3"/>
  <circle cx="640" cy="290" r="50" fill="#ccfbf1"/>
  <text x="640" y="308" text-anchor="middle" font-size="48">💼</text>
  <text x="640" y="400" text-anchor="middle" fill="#0f172a" font-size="34" font-weight="700">Jobs</text>
  <text x="640" y="445" text-anchor="middle" fill="#475569" font-size="22">Find work to</text>
  <text x="640" y="475" text-anchor="middle" fill="#475569" font-size="22">support daily life</text>

  <!-- pillar 3 -->
  <rect x="850" y="200" width="340" height="320" rx="20" fill="#ffffff" stroke="#5eead4" stroke-width="3"/>
  <circle cx="1020" cy="290" r="50" fill="#ccfbf1"/>
  <text x="1020" y="308" text-anchor="middle" font-size="48">🙌</text>
  <text x="1020" y="400" text-anchor="middle" fill="#0f172a" font-size="34" font-weight="700">Volunteer</text>
  <text x="1020" y="445" text-anchor="middle" fill="#475569" font-size="22">Join community</text>
  <text x="1020" y="475" text-anchor="middle" fill="#475569" font-size="22">activities</text>

  <text x="640" y="620" text-anchor="middle" fill="#0f766e" font-size="30" font-weight="600">Easy to Give, Work, and Volunteer — all in one app</text>
</svg>
