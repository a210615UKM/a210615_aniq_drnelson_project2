<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="120" fill="#b91c1c"/>
  <text x="80" y="78" fill="#ffffff" font-size="50" font-weight="700">The Problem</text>
  <text x="80" y="105" fill="#fecaca" font-size="24">SDG 1: No Poverty — Malaysia &amp; Globally</text>

  <!-- card 1 -->
  <rect x="80" y="180" width="350" height="200" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="135" cy="235" r="26" fill="#fee2e2"/>
  <text x="135" y="246" text-anchor="middle" font-size="30">💼</text>
  <text x="105" y="300" fill="#0f172a" font-size="28" font-weight="700">Unemployment</text>
  <text x="105" y="340" fill="#475569" font-size="21">Financial difficulty</text>
  <text x="105" y="368" fill="#475569" font-size="21">affording daily needs</text>

  <!-- card 2 -->
  <rect x="465" y="180" width="350" height="200" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="520" cy="235" r="26" fill="#fee2e2"/>
  <text x="520" y="246" text-anchor="middle" font-size="30">🤝</text>
  <text x="490" y="300" fill="#0f172a" font-size="28" font-weight="700">Lack of Support</text>
  <text x="490" y="340" fill="#475569" font-size="21">Limited access to</text>
  <text x="490" y="368" fill="#475569" font-size="21">basic needs</text>

  <!-- card 3 -->
  <rect x="850" y="180" width="350" height="200" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="905" cy="235" r="26" fill="#fee2e2"/>
  <text x="905" y="246" text-anchor="middle" font-size="30">❓</text>
  <text x="875" y="300" fill="#0f172a" font-size="28" font-weight="700">Where to Help?</text>
  <text x="875" y="340" fill="#475569" font-size="21">People don't know</text>
  <text x="875" y="368" fill="#475569" font-size="21">trusted organizations</text>

  <rect x="80" y="450" width="1120" height="180" rx="16" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="120" y="520" fill="#991b1b" font-size="30" font-weight="700">Many people want to help...</text>
  <text x="120" y="575" fill="#7f1d1d" font-size="26">but they don't know where to donate or how to find trusted organizations.</text>
</svg>
