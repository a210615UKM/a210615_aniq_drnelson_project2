<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1280" height="720" fill="#0f172a"/>
  <rect x="0" y="0" width="1280" height="110" fill="#1e293b"/>
  <text x="80" y="55" fill="#ffffff" font-size="42" font-weight="700">Code: API Fetching (Retrofit / HTTP)</text>
  <text x="80" y="92" fill="#5eead4" font-size="24">PledgeApiService.kt — GET request returns a List of campaigns</text>

  <rect x="80" y="150" width="1120" height="500" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="110" y="195" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">class <tspan fill="#fbbf24">PledgeApiService</tspan> {</text>
  <text x="110" y="240" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">  private val baseUrl = <tspan fill="#86efac">"https://api-staging.pledge.to/v1"</tspan></text>

  <text x="110" y="300" font-family="Consolas, monospace" font-size="22" fill="#c084fc">  suspend fun <tspan fill="#60a5fa">getCampaigns</tspan>(): <tspan fill="#fbbf24">Result&lt;List&lt;Campaign&gt;&gt;</tspan> =</text>
  <text x="110" y="335" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">    withContext(Dispatchers.IO) {</text>
  <text x="110" y="378" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">      val request = Request.Builder()</text>
  <text x="110" y="413" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">        .url(<tspan fill="#86efac">"$baseUrl/organizations?per=25"</tspan>)</text>
  <text x="110" y="448" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">        .header(<tspan fill="#86efac">"Authorization"</tspan>, <tspan fill="#86efac">"Bearer $apiKey"</tspan>)</text>
  <text x="110" y="483" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">        .<tspan fill="#f472b6">get</tspan>()</text>
  <text x="110" y="518" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">        .build()</text>
  <text x="110" y="561" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">      val response = client.newCall(request).execute()</text>
  <text x="110" y="604" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">      val campaigns = parseOrganizationList(body)  <tspan fill="#64748b">// live data</tspan></text>
  <text x="110" y="639" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">    }</text>
</svg>
