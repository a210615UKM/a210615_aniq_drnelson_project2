<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1280" height="720" fill="#0f172a"/>
  <rect x="0" y="0" width="1280" height="110" fill="#1e293b"/>
  <text x="80" y="55" fill="#ffffff" font-size="42" font-weight="700">Code: Sensor (GPS Location)</text>
  <text x="80" y="92" fill="#5eead4" font-size="24">LocationRepository.kt — FusedLocationProviderClient gets GPS coordinates</text>

  <rect x="80" y="150" width="1120" height="500" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="110" y="195" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">class <tspan fill="#fbbf24">LocationRepository</tspan>(context: Context) {</text>
  <text x="110" y="240" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">  private val fusedLocationClient =</text>
  <text x="110" y="275" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">    LocationServices.<tspan fill="#60a5fa">getFusedLocationProviderClient</tspan>(context)</text>

  <text x="110" y="335" font-family="Consolas, monospace" font-size="22" fill="#c084fc">  suspend fun <tspan fill="#60a5fa">getCurrentLocation</tspan>(): <tspan fill="#fbbf24">Result&lt;Location&gt;</tspan> {</text>
  <text x="110" y="378" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">    val cached = fusedLocationClient.lastLocation.await()</text>
  <text x="110" y="413" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">    if (cached != null) return Result.success(cached)</text>
  <text x="110" y="456" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">    val fresh = fusedLocationClient.<tspan fill="#f472b6">getCurrentLocation</tspan>(</text>
  <text x="110" y="491" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">        Priority.<tspan fill="#86efac">PRIORITY_HIGH_ACCURACY</tspan>,</text>
  <text x="110" y="526" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">        CancellationTokenSource().token</text>
  <text x="110" y="561" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">    ).await()</text>
  <text x="110" y="604" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">    return Result.success(fresh)  <tspan fill="#64748b">// used to sort nearby donations</tspan></text>
  <text x="110" y="639" font-family="Consolas, monospace" font-size="22" fill="#94a3b8">  }</text>
</svg>
